<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Intermédiaires | Formation OPCVM</title>
  <style>
    :root{--gold:#2F80ED;--gold-light:#56CCF2;--navy:#F7F9FC;--navy-mid:#FFFFFF;--slate:#5D6B7C;--white:#182233;--green:#219653;--gold-rgb:47,128,237;--white-rgb:255,255,255}*{box-sizing:border-box}body{margin:0;background:var(--navy);color:var(--white);font-family:Arial,sans-serif;line-height:1.55}.wrap{width:min(1120px,calc(100% - 2rem));margin:auto}a{color:inherit;text-decoration:none}.top{background:rgba(247,249,252,.94);border-bottom:1px solid rgba(var(--gold-rgb),.18)}.nav{display:flex;gap:1rem;align-items:center;min-height:70px;overflow:auto}.brand{font-weight:900}.brand span,h1 em{color:var(--gold-light)}.hero{padding:4rem 0 2rem}h1{font:700 clamp(2.5rem,7vw,5rem)/1 Georgia,serif}.muted{color:var(--slate)}.filters{display:flex;flex-wrap:wrap;gap:.75rem;margin:1.5rem 0}.filters input,.filters select,textarea{border:1px solid rgba(var(--gold-rgb),.25);border-radius:6px;background:var(--navy-mid);color:var(--white);padding:.8rem}.pill{border:1px solid rgba(var(--gold-rgb),.25);border-radius:999px;background:transparent;color:var(--gold-light);padding:.65rem .9rem;cursor:pointer}.pill.active{background:var(--gold);color:var(--navy)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.card{border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:var(--navy-mid);padding:1rem;cursor:pointer}.badge{color:var(--navy);background:var(--gold);border-radius:999px;padding:.25rem .55rem;font-weight:800}.stars{color:var(--gold-light)}.detail{display:none;margin-top:1rem;border-top:1px solid rgba(var(--gold-rgb),.12);padding-top:1rem}.card.open .detail{display:block}.review{padding:.7rem;border-radius:6px;background:var(--navy-mid);margin:.5rem 0}.form{display:grid;gap:.7rem;margin-top:1rem}button{border:1px solid var(--gold);border-radius:6px;background:var(--gold);color:var(--navy);font-weight:800;padding:.75rem 1rem}.msg{color:var(--gold-light)}@media(max-width:850px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top"><nav class="wrap nav"><a class="brand" href="/">Formation <span>OPCVM</span></a><a href="/societes-bourse.html">Sociétés TN</a><a href="/performances.html">Performances</a><a href="/societes-etrangeres.html">International</a><a href="/commentaires.html">Commentaires</a><a href="/membres.html">Membres</a></nav></header>
  <main class="wrap"><section class="hero"><p class="muted">Annuaire professionnel</p><h1>Intermédiaires en <em>Tunisie</em></h1><p class="muted">Filtrez par métier, ville et réputation moyenne.</p></section>
    <div class="filters"><input id="search" placeholder="Rechercher un nom"><select id="ville"><option value="">Toutes villes</option><option>Tunis</option><option>Sfax</option><option>Sousse</option></select><button class="pill active" data-type="">Tous</button><button class="pill" data-type="courtier">Courtier</button><button class="pill" data-type="gestionnaire">Gestionnaire</button><button class="pill" data-type="conseiller">Conseiller</button><button class="pill" data-type="banque">Banque</button></div>
    <div id="cards" class="grid"></div>
  </main>
  <script>
    let all=[],type='';
    const stars=n=>'★'.repeat(Math.round(n||0))+'☆'.repeat(5-Math.round(n||0));
    async function load(){const p=new URLSearchParams(); if(type)p.set('type',type); if(ville.value)p.set('ville',ville.value); all=await fetch(`/api/intermediaires?${p}`).then(r=>r.json()); render();}
    function render(){const q=search.value.toLowerCase(); cards.innerHTML=all.filter(i=>i.nom.toLowerCase().includes(q)).map(i=>`<article class="card" data-id="${i.id}"><h3>${i.nom}</h3><span class="badge">${i.type}</span><p class="muted">${i.ville} · ${i.telephone||''}</p><p>${i.email||''}</p><div class="stars">${stars(i.note_calculee||i.note_moyenne)} <span class="muted">(${i.avis_count||0} avis)</span></div><div class="detail" id="d${i.id}"><p class="muted">Chargement...</p></div></article>`).join('');}
    async function detail(card){card.classList.toggle('open'); const box=card.querySelector('.detail'); if(box.dataset.loaded)return; const i=await fetch(`/api/intermediaires/${card.dataset.id}`).then(r=>r.json()); box.dataset.loaded=1; box.innerHTML=`<p>${i.description||''}</p><h4>Avis</h4>${(i.avis||[]).map(a=>`<div class="review"><strong>${a.prenom} ${a.nom}</strong><div class="stars">${stars(a.note)}</div><p>${a.commentaire||''}</p></div>`).join('')||'<p class="muted">Aucun avis.</p>'}<form class="form" data-review="${i.id}"><select name="note"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><textarea name="commentaire" placeholder="Votre avis"></textarea><button>Envoyer un avis</button><span class="msg"></span></form>`;}
    document.addEventListener('click',e=>{const c=e.target.closest('.card'); if(c&&!e.target.closest('form'))detail(c); if(e.target.matches('.pill')){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active')); e.target.classList.add('active'); type=e.target.dataset.type; load();}});
    document.addEventListener('submit',async e=>{const f=e.target.closest('[data-review]'); if(!f)return; e.preventDefault(); const r=await fetch(`/api/intermediaires/${f.dataset.review}/avis`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(f)))}); f.querySelector('.msg').textContent=r.ok?'Avis enregistré.':'Connectez-vous pour publier un avis.';});
    search.addEventListener('input',render); ville.addEventListener('change',load); load();
  </script>
</body>
</html>
