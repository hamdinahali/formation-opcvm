<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Performances | Formation OPCVM</title>
  <style>
    :root{--gold:#2F80ED;--gold-light:#56CCF2;--navy:#F7F9FC;--navy-mid:#FFFFFF;--slate:#5D6B7C;--white:#182233;--green:#219653;--gold-rgb:47,128,237;--white-rgb:255,255,255}*{box-sizing:border-box}body{margin:0;background:var(--navy);color:var(--white);font-family:Arial,sans-serif}.wrap{width:min(1120px,calc(100% - 2rem));margin:auto}.nav{display:flex;gap:1rem;align-items:center;min-height:70px;overflow:auto;border-bottom:1px solid rgba(var(--gold-rgb),.18)}a{color:inherit;text-decoration:none}.brand{font-weight:900}.brand span,h1 em{color:var(--gold-light)}.hero{padding:4rem 0 2rem}h1{font:700 clamp(2.5rem,7vw,5rem)/1 Georgia,serif}.muted{color:var(--slate)}.tabs{display:flex;gap:.75rem;margin:1rem 0 2rem}.tabs button,.btn{border:1px solid var(--gold);border-radius:6px;background:transparent;color:var(--gold-light);padding:.8rem 1rem;font-weight:800}.tabs .active,.btn{background:var(--gold);color:var(--navy)}.summary,.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.card,.panel{border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:var(--navy-mid);padding:1rem}.podium{align-items:end;margin:1.5rem 0}.place{text-align:center}.place .block{display:grid;place-items:center;margin-top:1rem;border-radius:6px 6px 0 0;background:linear-gradient(var(--gold-light),var(--gold));color:var(--navy);font-size:2rem;font-weight:900}.place:nth-child(1) .block{height:130px}.place:nth-child(2) .block{height:170px}.place:nth-child(3) .block{height:105px}table{width:100%;border-collapse:collapse}th,td{padding:.85rem;border-bottom:1px solid rgba(var(--gold-rgb),.1);text-align:left;color:var(--slate)}th{color:var(--white);text-transform:uppercase;font-size:.78rem}.avatar{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:50%;background:rgba(var(--gold-rgb),.18);color:var(--gold-light);margin-right:.5rem}@media(max-width:850px){.summary,.podium{grid-template-columns:1fr}}
  </style>
</head>
<body><header class="wrap nav"><a class="brand" href="/">Formation <span>OPCVM</span></a><a href="/societes-bourse.html">Sociétés TN</a><a href="/intermediaires.html">Intermédiaires</a><a href="/societes-etrangeres.html">International</a><a href="/commentaires.html">Commentaires</a><a href="/membres.html">Membres</a></header>
  <main class="wrap"><section class="hero"><p class="muted">Classements</p><h1>Performances des Investisseurs et <em>Étudiants</em></h1></section><div class="tabs"><button class="active" data-type="investisseurs">Investisseurs</button><button data-type="etudiants">Étudiants</button></div><section class="summary" id="summary"></section><section class="podium" id="podium"></section><article class="panel"><h2>Leaderboard</h2><table><thead><tr><th>Rang</th><th>Nom</th><th>Score</th><th>Rendement</th><th>Cours terminés</th><th>Badge</th></tr></thead><tbody id="rows"></tbody></table></article><article class="panel" style="margin:1.5rem 0 3rem"><h2>Mes statistiques</h2><div id="mine" class="muted">Connectez-vous pour voir votre progression personnelle.</div></article></main>
  <script>
    let type='investisseurs'; const badge=s=>s>=90?'Expert':s>=80?'Confirmé':'En progression';
    function animate(el,v){let n=0,step=Math.max(v/25,1); const t=setInterval(()=>{n+=step;if(n>=v){n=v;clearInterval(t)}el.textContent=Number(n).toFixed(v%1?1:0)},25)}
    async function load(){const [list,global,moi]=await Promise.all([fetch(`/api/performances/${type}`).then(r=>r.json()),fetch('/api/performances/global').then(r=>r.json()),fetch('/api/performances/moi').then(r=>r.ok?r.json():null)]);
      summary.innerHTML=`<div class="card"><strong data-num="${global.moyenne_plateforme}">0</strong><p class="muted">Moyenne plateforme</p></div><div class="card"><strong data-num="${global.meilleur_score}">0</strong><p class="muted">Meilleur score</p></div><div class="card"><strong data-num="${global.participants}">0</strong><p class="muted">Participants</p></div>`; document.querySelectorAll('[data-num]').forEach(e=>animate(e,Number(e.dataset.num||0)));
      const top=[list[1],list[0],list[2]].filter(Boolean); podium.innerHTML=top.map((p,i)=>`<div class="place"><h3>${p.nom_public}</h3><p class="muted">${p.score} pts</p><div class="block">${p.rang}</div></div>`).join('');
      rows.innerHTML=list.map(p=>`<tr><td>${p.rang}</td><td><span class="avatar">${p.nom_public[0]}</span>${p.nom_public}</td><td>${p.score}</td><td>${Number(p.rendement_pct).toFixed(1)}%</td><td>${p.nb_cours_finis}</td><td>${badge(p.score)}</td></tr>`).join('');
      if(moi&&moi.user){mine.innerHTML=`<strong>${moi.user.prenom} ${moi.user.nom}</strong><p>Score: ${moi.rank?.score||0} · Rendement: ${moi.stats?.rendement_pct||0}% · Progression vs moyenne: ${((moi.rank?.score||0)-global.moyenne_plateforme).toFixed(1)} pts</p>`;}
    }
    document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');type=b.dataset.type;load();}); load();
  </script>
</body></html>
