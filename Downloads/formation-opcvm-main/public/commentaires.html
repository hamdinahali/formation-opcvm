<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Commentaires | Formation OPCVM</title>
  <style>
    :root{--gold:#2F80ED;--gold-light:#56CCF2;--navy:#F7F9FC;--navy-mid:#FFFFFF;--slate:#5D6B7C;--white:#182233;--green:#219653;--gold-rgb:47,128,237;--white-rgb:255,255,255}*{box-sizing:border-box}body{margin:0;background:var(--navy);color:var(--white);font-family:Arial,sans-serif;line-height:1.55}.wrap{width:min(1050px,calc(100% - 2rem));margin:auto}a{color:inherit;text-decoration:none}.nav{display:flex;gap:1rem;align-items:center;min-height:70px;overflow:auto;border-bottom:1px solid rgba(var(--gold-rgb),.18)}.brand{font-weight:900}.brand span,h1 em{color:var(--gold-light)}.hero{padding:4rem 0 1.5rem}h1{font:700 clamp(2.5rem,7vw,5rem)/1 Georgia,serif}.muted{color:var(--slate)}.filters{display:flex;gap:.75rem;flex-wrap:wrap;margin:1rem 0}.filters button,.btn{border:1px solid var(--gold);border-radius:6px;background:transparent;color:var(--gold-light);padding:.7rem 1rem;font-weight:800}.filters .active,.btn{background:var(--gold);color:var(--navy)}.card,.panel{border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:var(--navy-mid);color:var(--white);padding:1rem;margin:1rem 0}.head{display:flex;justify-content:space-between;gap:1rem}.avatar{display:inline-grid;place-items:center;width:42px;height:42px;border-radius:50%;background:rgba(var(--gold-rgb),.12);color:var(--gold);font-weight:900;margin-right:.7rem}.stars{color:var(--gold)}textarea,select,input{width:100%;border:1px solid rgba(var(--gold-rgb),.2);border-radius:6px;background:var(--navy-mid);color:var(--white);padding:.8rem;margin:.35rem 0}.actions{display:flex;gap:.5rem;flex-wrap:wrap}.actions button{border:1px solid rgba(var(--gold-rgb),.18);border-radius:6px;background:#fff;color:var(--white);padding:.45rem .7rem}.admin{background:var(--navy-mid);color:var(--white)}.msg{color:var(--gold-light)}
  </style>
</head>
<body><header class="wrap nav"><a class="brand" href="/">Formation <span>OPCVM</span></a><a href="/societes-bourse.html">Sociétés TN</a><a href="/intermediaires.html">Intermédiaires</a><a href="/performances.html">Performances</a><a href="/societes-etrangeres.html">International</a><a href="/membres.html">Membres</a></header>
  <main class="wrap"><section class="hero"><p class="muted">Communauté</p><h1>Commentaires et <em>retours</em></h1></section><div class="filters"><button class="active" data-type="">Tous</button><button data-type="cours">Cours</button><button data-type="societe">Société</button><button data-type="general">Général</button></div><section class="panel"><h2>Publier un commentaire</h2><form id="form"><select name="type_cible"><option value="general">Général</option><option value="cours">Cours</option><option value="societe">Société</option><option value="intermediaire">Intermédiaire</option></select><select name="note"><option value="">Note optionnelle</option><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><textarea name="contenu" required placeholder="Votre commentaire"></textarea><button class="btn">Envoyer</button><span class="msg" id="msg"></span></form></section><section id="feed"></section><section id="admin"></section></main>
  <script>
    let type=''; const stars=n=>n?'★'.repeat(n)+'☆'.repeat(5-n):''; const initials=c=>`${c.prenom?.[0]||'M'}${c.nom?.[0]||''}`;
    async function load(){const p=new URLSearchParams(); if(type)p.set('type',type); const data=await fetch(`/api/commentaires?${p}`).then(r=>r.json()); feed.innerHTML=data.comments.map(c=>`<article class="card"><div class="head"><div><span class="avatar">${initials(c)}</span><strong>${c.prenom||'Membre'} ${c.nom||''}</strong></div><small>${c.created_at}</small></div><p>${c.contenu}</p><div class="stars">${stars(c.note)}</div><div class="actions"><button data-react="${c.id}" data-kind="like">Like ${c.likes||0}</button><button data-react="${c.id}" data-kind="dislike">Dislike ${c.dislikes||0}</button><span class="muted">Réponses 0</span></div></article>`).join('')||'<p class="muted">Aucun commentaire approuvé.</p>'; admin.innerHTML=data.pending?.length?`<section class="panel admin"><h2>Modération</h2>${data.pending.map(c=>`<article class="card" data-row="${c.id}"><strong>${c.prenom||'Membre'} ${c.nom||''}</strong><p>${c.contenu}</p><div class="actions"><button data-approve="${c.id}">Approuver</button><button data-delete="${c.id}">Supprimer</button></div></article>`).join('')}</section>`:'';}
    form.onsubmit=async e=>{e.preventDefault(); const res=await fetch('/api/commentaires',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(form)))}); const data=await res.json().catch(()=>({})); msg.textContent=res.ok?data.message:'Connectez-vous pour publier.'; if(res.ok)form.reset();};
    document.addEventListener('click',async e=>{if(e.target.dataset.type!==undefined){document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');type=e.target.dataset.type;load()} if(e.target.dataset.react){await fetch(`/api/commentaires/${e.target.dataset.react}/react`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:e.target.dataset.kind})});load()} if(e.target.dataset.approve||e.target.dataset.delete){const id=e.target.dataset.approve||e.target.dataset.delete; await fetch(e.target.dataset.approve?`/api/commentaires/${id}/approve`:`/api/commentaires/${id}`,{method:e.target.dataset.approve?'PUT':'DELETE'});load();}});
    load();
  </script>
</body></html>
