<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sociétés de Bourse | Formation OPCVM</title>
  <style>
    :root{--gold:#2F80ED;--gold-light:#56CCF2;--navy:#F7F9FC;--navy-mid:#FFFFFF;--slate:#5D6B7C;--white:#182233;--green:#219653;--red:#D64550;--gold-rgb:47,128,237;--white-rgb:255,255,255}
    *{box-sizing:border-box}body{margin:0;background:var(--navy);color:var(--white);font-family:"DM Sans",Arial,sans-serif;line-height:1.55}a{color:inherit;text-decoration:none}.wrap{width:min(1120px,calc(100% - 2rem));margin:auto}.top{position:sticky;top:0;z-index:2;background:rgba(247,249,252,.94);border-bottom:1px solid rgba(var(--gold-rgb),.18)}.nav{display:flex;align-items:center;gap:1rem;min-height:70px;overflow:auto}.brand{font-size:1.35rem;font-weight:800}.brand span,h1 em{color:var(--gold-light)}.nav a{white-space:nowrap;color:var(--slate)}.back{margin-left:auto;color:var(--gold-light)}.hero{padding:5rem 0 2rem;background:radial-gradient(circle at 75% 10%,rgba(var(--gold-rgb),.2),transparent 30rem)}h1{max-width:900px;margin:.4rem 0;font-family:Georgia,serif;font-size:clamp(2.5rem,7vw,5.4rem);line-height:1}.muted{color:var(--slate)}.filters{display:flex;flex-wrap:wrap;gap:.75rem;margin:2rem 0}.filters select,.filters button{border:1px solid rgba(var(--gold-rgb),.28);border-radius:6px;background:var(--navy-mid);color:var(--white);padding:.8rem 1rem}.filters button{background:var(--gold);color:var(--navy);font-weight:800}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.card,.panel{border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:var(--navy-mid);padding:1rem}.logo{display:grid;place-items:center;width:58px;height:58px;border-radius:50%;background:rgba(var(--gold-rgb),.16);color:var(--gold-light);font-weight:900}.card-head{display:flex;gap:1rem;align-items:center}.badge{display:inline-flex;border-radius:999px;padding:.25rem .55rem;font-weight:800}.pos{background:rgba(46,204,113,.16);color:var(--green)}.neg{background:rgba(232,93,117,.16);color:var(--red)}.stars{color:var(--gold-light);letter-spacing:2px}.metric{display:flex;justify-content:space-between;gap:1rem;margin-top:.7rem;color:var(--slate)}table{width:100%;border-collapse:collapse;margin-top:1rem}th,td{padding:.85rem;border-bottom:1px solid rgba(var(--gold-rgb),.1);text-align:left;color:var(--slate)}th{color:var(--white);font-size:.78rem;text-transform:uppercase}.bar{display:grid;grid-template-columns:170px 1fr 52px;gap:.75rem;align-items:center;margin:.7rem 0}.bar span:first-child{color:var(--slate)}.fill{height:18px;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-light));animation:grow .9s ease both}@keyframes grow{from{width:0}}@media(max-width:850px){.grid{grid-template-columns:1fr}.bar{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top"><nav class="wrap nav"><a class="brand" href="/">Formation <span>OPCVM</span></a><a href="/intermediaires.html">Intermédiaires</a><a href="/performances.html">Performances</a><a href="/societes-etrangeres.html">International</a><a href="/commentaires.html">Commentaires</a><a href="/membres.html">Membres</a><a class="back" href="/">Retour</a></nav></header>
  <main>
    <section class="hero"><div class="wrap"><p class="muted">Marché tunisien</p><h1>Performances des Sociétés de Bourse <em>— Tunisie</em></h1><p class="muted">Comparez rendement, volumes, clientèle et actifs gérés.</p></div></section>
    <section class="wrap">
      <div class="filters"><select id="year"><option value="">Année récente</option><option>2022</option><option>2023</option><option>2024</option><option>2025</option></select><select id="quarter"><option value="">Tous trimestres</option><option value="1">T1</option><option value="2">T2</option><option value="3">T3</option><option value="4">T4</option></select><button id="apply">Filtrer</button></div>
      <div class="grid" id="cards"></div>
      <article class="panel" style="margin:1.5rem 0"><h2>Classement</h2><table><thead><tr><th>Rang</th><th>Société</th><th>Rendement</th><th>Volume</th><th>Clients</th></tr></thead><tbody id="ranking"></tbody></table></article>
      <article class="panel" style="margin-bottom:3rem"><h2>Comparaison des rendements</h2><div id="chart"></div></article>
    </section>
  </main>
  <script>
    const fmtM=value=>`${Math.round((Number(value)||0)/1000000)} M DT`;
    const badge=v=>`<span class="badge ${Number(v)>=0?'pos':'neg'}">${Number(v||0).toFixed(1)}%</span>`;
    async function load(){
      const p=new URLSearchParams(); if(year.value)p.set('annee',year.value); if(quarter.value)p.set('trimestre',quarter.value);
      const rows=await fetch(`/api/societes?${p}`).then(r=>r.json());
      cards.innerHTML=rows.map(s=>`<article class="card"><div class="card-head"><div class="logo">${(s.sigle||s.nom).slice(0,2)}</div><div><h3>${s.nom}</h3><div>${badge(s.rendement_pct)}</div></div></div><p class="muted">${s.description||''}</p><div class="metric"><span>Actif géré</span><strong>${fmtM(s.actif_gere)}</strong></div><div class="metric"><span>Note</span><strong>${Number(s.note_globale||0).toFixed(1)}/5 <span class="stars">${'★'.repeat(Math.round(s.note_globale||0))}</span></strong></div></article>`).join('');
      ranking.innerHTML=rows.map((s,i)=>`<tr><td>${i+1}</td><td><strong>${s.nom}</strong></td><td>${badge(s.rendement_pct)}</td><td>${Number(s.volume_echange||0).toLocaleString('fr-FR')}</td><td>${Number(s.nombre_clients||0).toLocaleString('fr-FR')}</td></tr>`).join('');
      const max=Math.max(...rows.map(r=>Math.abs(Number(r.rendement_pct)||0)),1);
      chart.innerHTML=rows.map(s=>`<div class="bar"><span>${s.nom}</span><div><div class="fill" style="width:${Math.abs(Number(s.rendement_pct)||0)/max*100}%"></div></div><strong>${Number(s.rendement_pct||0).toFixed(1)}%</strong></div>`).join('');
    }
    apply.addEventListener('click',load); load();
  </script>
</body>
</html>
