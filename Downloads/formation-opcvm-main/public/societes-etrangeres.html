<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sociétés étrangères | Formation OPCVM</title>
  <style>
    :root{--gold:#2F80ED;--gold-light:#56CCF2;--navy:#F7F9FC;--navy-mid:#FFFFFF;--slate:#5D6B7C;--white:#182233;--green:#219653;--red:#D64550;--gold-rgb:47,128,237;--white-rgb:255,255,255}*{box-sizing:border-box}body{margin:0;background:var(--navy);color:var(--white);font-family:Arial,sans-serif;line-height:1.55}.wrap{width:min(1120px,calc(100% - 2rem));margin:auto}a{color:inherit;text-decoration:none}.nav{display:flex;gap:1rem;align-items:center;min-height:70px;overflow:auto;border-bottom:1px solid rgba(var(--gold-rgb),.18)}.brand{font-weight:900}.brand span,h1 em{color:var(--gold-light)}.hero{padding:4rem 0 2rem}h1{font:700 clamp(2.5rem,7vw,5rem)/1 Georgia,serif}.muted{color:var(--slate)}.map{position:relative;min-height:220px;margin:1.5rem 0;border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:linear-gradient(180deg,#EAF4FF,#F7F9FC);overflow:hidden}.land{position:absolute;border-radius:40%;background:rgba(var(--gold-rgb),.25);border:1px solid rgba(var(--gold-rgb),.35)}.eu{left:49%;top:22%;width:14%;height:25%}.af{left:47%;top:48%;width:18%;height:36%}.na{left:16%;top:24%;width:22%;height:29%}.filters{display:flex;flex-wrap:wrap;gap:.75rem;margin:1.5rem 0}.filters select{border:1px solid rgba(var(--gold-rgb),.25);border-radius:6px;background:var(--navy-mid);color:var(--white);padding:.8rem}.panel{border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:var(--navy-mid);padding:1rem;margin-bottom:1.5rem}table{width:100%;border-collapse:collapse}th,td{padding:.85rem;border-bottom:1px solid rgba(var(--gold-rgb),.1);text-align:left;color:var(--slate)}th{color:var(--white);text-transform:uppercase;font-size:.78rem}.badge{border-radius:999px;padding:.25rem .55rem;font-weight:800}.pos{background:rgba(46,204,113,.16);color:var(--green)}.neg{background:rgba(232,93,117,.16);color:var(--red)}.bar{display:grid;grid-template-columns:120px 1fr 60px;gap:.75rem;align-items:center;margin:.7rem 0}.fill{height:18px;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-light));animation:grow .9s ease both}@keyframes grow{from{width:0}}@media(max-width:800px){.bar{grid-template-columns:1fr}}
  </style>
</head>
<body><header class="wrap nav"><a class="brand" href="/">Formation <span>OPCVM</span></a><a href="/societes-bourse.html">Sociétés TN</a><a href="/intermediaires.html">Intermédiaires</a><a href="/performances.html">Performances</a><a href="/commentaires.html">Commentaires</a><a href="/membres.html">Membres</a></header>
  <main class="wrap"><section class="hero"><p class="muted">International</p><h1>Performances des Sociétés à <em>l'Étranger</em></h1><p class="muted">Données converties en DT à titre indicatif.</p><div class="map"><div class="land na"></div><div class="land eu"></div><div class="land af"></div></div></section><div class="filters"><select id="pays"><option value="">Tous pays</option><option>France</option><option>USA</option><option>Maroc</option><option>Algérie</option></select><select id="secteur"><option value="">Tous secteurs</option><option>Technologie</option><option>Banque</option><option>Energie</option><option>Luxe</option><option>Telecom</option></select><select id="annee"><option>2025</option><option>2024</option><option>2023</option></select></div><article class="panel"><h2>Tableau de performance</h2><table><thead><tr><th>Société</th><th>Pays</th><th>Ticker</th><th>Rendement</th><th>Variation</th><th>Devise</th></tr></thead><tbody id="rows"></tbody></table></article><article class="panel"><h2>Comparaison par pays</h2><div id="chart"></div></article></main>
  <script>
    const flags={France:'🇫🇷',USA:'🇺🇸',Maroc:'🇲🇦','Algérie':'🇩🇿'}; const b=v=>`<span class="badge ${Number(v)>=0?'pos':'neg'}">${Number(v||0).toFixed(1)}%</span>`;
    async function load(){const p=new URLSearchParams(); if(pays.value)p.set('pays',pays.value); if(secteur.value)p.set('secteur',secteur.value); const data=await fetch(`/api/etrangeres?${p}`).then(r=>r.json()); rows.innerHTML=data.map(s=>`<tr><td><strong>${s.nom}</strong></td><td>${flags[s.pays]||''} ${s.pays}</td><td>${s.ticker||''}</td><td>${b(s.rendement_pct)}</td><td>${b(s.variation_pct)}</td><td>${s.devise||''}</td></tr>`).join(''); const groups={}; data.forEach(s=>groups[s.pays]=(groups[s.pays]||[]).concat(Number(s.rendement_pct)||0)); const avg=Object.entries(groups).map(([k,v])=>[k,v.reduce((a,b)=>a+b,0)/v.length]); const max=Math.max(...avg.map(x=>Math.abs(x[1])),1); chart.innerHTML=avg.map(([k,v])=>`<div class="bar"><span>${flags[k]||''} ${k}</span><div><div class="fill" style="width:${Math.abs(v)/max*100}%"></div></div><strong>${v.toFixed(1)}%</strong></div>`).join('');}
    pays.onchange=secteur.onchange=annee.onchange=load; load();
  </script>
</body></html>
