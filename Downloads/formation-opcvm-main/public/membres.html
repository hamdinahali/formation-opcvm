<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Membres | Formation OPCVM</title>
  <style>
    :root{--gold:#2F80ED;--gold-light:#56CCF2;--navy:#F7F9FC;--navy-mid:#FFFFFF;--slate:#5D6B7C;--white:#182233;--green:#219653;--gold-rgb:47,128,237;--white-rgb:255,255,255}*{box-sizing:border-box}body{margin:0;background:var(--navy);color:var(--white);font-family:Arial,sans-serif;line-height:1.55}.wrap{width:min(1120px,calc(100% - 2rem));margin:auto}a{color:inherit;text-decoration:none}.nav{display:flex;gap:1rem;align-items:center;min-height:70px;overflow:auto;border-bottom:1px solid rgba(var(--gold-rgb),.18)}.brand{font-weight:900}.brand span,h1 em{color:var(--gold-light)}.hero{padding:4rem 0 1.5rem}h1{font:700 clamp(2.5rem,7vw,5rem)/1 Georgia,serif}.muted{color:var(--slate)}input,textarea{width:100%;border:1px solid rgba(var(--gold-rgb),.25);border-radius:6px;background:var(--navy-mid);color:var(--white);padding:.8rem;margin:.35rem 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}.card,.panel{border:1px solid rgba(var(--gold-rgb),.18);border-radius:8px;background:var(--navy-mid);padding:1rem;margin:1rem 0}.avatar{display:grid;place-items:center;width:58px;height:58px;border-radius:50%;background:rgba(var(--gold-rgb),.16);color:var(--gold-light);font-weight:900}.badge{display:inline-block;border-radius:999px;background:var(--gold);color:var(--navy);padding:.25rem .55rem;font-weight:800}.btn,button{border:1px solid var(--gold);border-radius:6px;background:var(--gold);color:var(--navy);font-weight:800;padding:.75rem 1rem}.modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(24,34,51,.28);padding:1rem}.modal.open{display:grid}.modal-card{width:min(620px,100%);max-height:90vh;overflow:auto;border:1px solid rgba(var(--gold-rgb),.25);border-radius:8px;background:var(--navy-mid);padding:1rem}.message{border-left:3px solid var(--gold);padding:.75rem;background:var(--navy-mid);margin:.6rem 0}.unread{border-left-color:var(--green)}.msg{color:var(--gold-light)}@media(max-width:850px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><header class="wrap nav"><a class="brand" href="/">Formation <span>OPCVM</span></a><a href="/societes-bourse.html">Sociétés TN</a><a href="/intermediaires.html">Intermédiaires</a><a href="/performances.html">Performances</a><a href="/societes-etrangeres.html">International</a><a href="/commentaires.html">Commentaires</a></header>
  <main class="wrap"><section class="hero"><p class="muted">Seuls les membres ayant activé leur profil public sont visibles</p><h1>Contacts des <em>Membres</em></h1><input id="q" placeholder="Rechercher par nom, ville, spécialité"></section><section class="grid" id="members"></section><section class="panel"><h2>Mes messages <span id="unread"></span></h2><div id="inbox" class="muted">Connectez-vous pour lire votre messagerie.</div></section><section class="panel"><h2>Modifier mon profil public</h2><form id="profile"><input name="ville" placeholder="Ville"><input name="specialite" placeholder="Spécialité"><input name="linkedin" placeholder="LinkedIn"><textarea name="bio" placeholder="Bio courte"></textarea><textarea name="experience" placeholder="Expérience"></textarea><label><input name="visible" type="checkbox" checked style="width:auto"> Profil visible</label><br><button>Enregistrer</button><span class="msg" id="profileMsg"></span></form></section></main>
  <div class="modal" id="modal"><div class="modal-card"><button id="close" style="float:right">Fermer</button><div id="detail"></div></div></div>
  <script>
    let rows=[]; const init=m=>`${m.prenom?.[0]||''}${m.nom?.[0]||''}`; const excerpt=t=>(t||'').slice(0,120)+((t||'').length>120?'...':'');
    async function load(){const p=new URLSearchParams(); if(q.value)p.set('q',q.value); const data=await fetch(`/api/membres?${p}`).then(r=>r.json()); rows=data.members||[]; members.innerHTML=rows.map(m=>`<article class="card" data-id="${m.user_id}"><div class="avatar">${init(m)}</div><h3>${m.prenom} ${m.nom}</h3><span class="badge">${m.role}</span><p class="muted">${m.ville||''} · ${m.specialite||''}</p><p>${excerpt(m.bio)}</p></article>`).join('')||'<p class="muted">Aucun profil public.</p>'; loadInbox();}
    async function loadInbox(){const res=await fetch('/api/membres/messages/inbox'); if(!res.ok)return; const data=await res.json(); unread.textContent=`(${data.filter(m=>!m.lu).length} non lus)`; inbox.className=''; inbox.innerHTML=data.map(m=>`<div class="message ${m.lu?'':'unread'}"><strong>${m.sujet}</strong><p class="muted">De ${m.expediteur_prenom} ${m.expediteur_nom} · ${m.created_at}</p><p>${m.contenu}</p>${m.lu?'':`<button data-read="${m.id}">Marquer lu</button>`}</div>`).join('')||'<p class="muted">Aucun message.</p>';}
    async function openMember(id){const m=await fetch(`/api/membres/${id}`).then(r=>r.json()); detail.innerHTML=`<h2>${m.prenom} ${m.nom}</h2><span class="badge">${m.role}</span><p class="muted">${m.ville||''} · ${m.specialite||''}</p><p>${m.bio||''}</p><p>${m.experience||''}</p>${m.linkedin?`<p><a href="${m.linkedin}">${m.linkedin}</a></p>`:''}<form id="message"><input name="sujet" required placeholder="Sujet"><textarea name="contenu" required placeholder="Votre message"></textarea><button>Envoyer un message</button><span class="msg"></span></form>`; modal.classList.add('open'); message.onsubmit=async e=>{e.preventDefault(); const r=await fetch(`/api/membres/${id}/message`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(message)))}); message.querySelector('.msg').textContent=r.ok?'Message envoyé.':'Connectez-vous pour envoyer un message.'; if(r.ok)message.reset();};}
    members.onclick=e=>{const c=e.target.closest('.card'); if(c)openMember(c.dataset.id)}; close.onclick=()=>modal.classList.remove('open'); q.oninput=load;
    profile.onsubmit=async e=>{e.preventDefault(); const data=Object.fromEntries(new FormData(profile)); data.visible=profile.visible.checked; const r=await fetch('/api/membres/profil',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); profileMsg.textContent=r.ok?'Profil enregistré.':'Connectez-vous pour modifier votre profil.'; if(r.ok)load();};
    document.addEventListener('click',async e=>{if(e.target.dataset.read){await fetch(`/api/membres/messages/${e.target.dataset.read}/lu`,{method:'PUT'});loadInbox();}}); load();
  </script>
</body></html>
